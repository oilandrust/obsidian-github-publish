name: Release Obsidian plugin

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag=$(node -p "require('./manifest.json').version")
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" manifest.json main.js styles.css --clobber
          else
            gh release create "$tag" \
              --title="$tag" \
              --notes="See [README](https://github.com/oilandrust/obsidian-github-publish#install) for install instructions." \
              manifest.json \
              main.js \
              styles.css
          fi
